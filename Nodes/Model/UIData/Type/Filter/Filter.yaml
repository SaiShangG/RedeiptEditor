- Class: DataType
  Name: BatchState
  Id: g=c14d0058cf040d7cf7fc16b466bce49c
  Supertype: Enumeration
  EnumDefinition: 
   {
    "Name": "BatchState",
    "DataType": {
     "IdType": 2,
     "Id": "c14d0058cf040d7cf7fc16b466bce49c",
     "Namespace": 7
    },
    "Fields": [{
      "Name": "Value0",
      "Value": 0,
      "DisplayName": {
       "LocaleId": "en-US",
       "Text": "Idle"
      },
      "Description": {
       "LocaleId": "en-US",
       "Text": "In either Semi Auto Mode or Auto Mode, the system is in its idle state where controllers\n(ON/OFF valves) or equipment module are not energized, or Phase is not active."
      }
     },{
      "Name": "Value1",
      "Value": 1,
      "DisplayName": {
       "LocaleId": "en-US",
       "Text": "Pause"
      },
      "Description": {
       "LocaleId": "en-US",
       "Text": "Filter by name"
      }
     },{
      "Name": "Value2",
      "Value": 2,
      "DisplayName": {
       "LocaleId": "en-US",
       "Text": "Resume"
      },
      "Description": {
       "LocaleId": "en-US",
       "Text": "Filter by daterange"
      }
     },{
      "Name": "Value3",
      "Value": 4,
      "DisplayName": {
       "LocaleId": "en-US",
       "Text": "Start"
      },
      "Description": {
       "LocaleId": "en-US",
       "Text": "In Auto /Semi Auto Mode, process can be started by an operator. Process that has been\nstarted first checks to determine whether defined starting conditions for the process are\nfulfilled.\n"
      }
     },{
      "Name": "Value4",
      "Value": 5,
      "DisplayName": {
       "LocaleId": "en-US",
       "Text": "Stop"
      },
      "Description": {
       "LocaleId": "en-US",
       "Text": "In Auto /Semi Auto Mode, batch be stopped by an operator. All control and equipment\nmodules are de-energized. The operation or Phase will end and system returns to its Idle\nState."
      }
     },{
      "Name": "Value5",
      "Value": 6,
      "DisplayName": {
       "LocaleId": "en-US",
       "Text": "Running"
      },
      "Description": {
       "LocaleId": "en-US",
       "Text": "In either Semi Auto Mode or Auto Mode, after starting the batch the system will be\nin running status with the specific phase conditions saved by the user."
      }
     },{
      "Name": "Value6",
      "Value": 7,
      "DisplayName": {
       "LocaleId": "en-US",
       "Text": "Paused"
      },
      "Description": {
       "LocaleId": "en-US",
       "Text": "Operation or Phase in auto mode and semi auto batch in semi auto mode can be\npaused by the user. In this state, all control and equipment modules are de-energized while\nan Operation or Phase is still active. All Phase Timer(s) are paused. This state is achieved\neither by operator activation of the pause phase (Pause) or by the triggering of a critical\nalarm (Error).\n"
      }
     },{
      "Name": "Value7",
      "Value": 8,
      "DisplayName": {
       "LocaleId": "en-US",
       "Text": "Safe Restart"
      },
      "Description": {
       "LocaleId": "en-US",
       "Text": "From Pause State, upon activating the resume command, the system will\nresume the phase (which is part of an operation) and restarts devices after a delay timer and\nparameters defined in section 8.1.9 Global parameter Screen once this timer elapses the\nsystem continues with parameters as per the automated sequence."
      }
     },{
      "Name": "Value8",
      "Value": 9,
      "DisplayName": {
       "LocaleId": "en-US",
       "Text": "Abort"
      },
      "Description": {
       "LocaleId": "en-US",
       "Text": "Operation or Phase in auto mode and semi auto batch in semi auto mode can be\nstopped/aborted by an operator. All control and equipment modules are de-energized. The\noperation or phase is aborted, and the system returns to its Idle State."
      }
     },{
      "Name": "Value9",
      "Value": 10,
      "DisplayName": {
       "LocaleId": "en-US",
       "Text": "Completed"
      },
      "Description": {
       "LocaleId": "en-US",
       "Text": "In either Semi Auto Mode or Auto Mode, Batch will be completed upon\nsatisfying the end conditions of the respective mode."
      }
     }]
   }
  Children:
  - Name: ns=0;EnumValues
    Type: BaseDataVariableType
    DataType: EnumValueType
    ModellingRule: None
    ValueRank: OneDimension
    ArrayDimensions: [0]
